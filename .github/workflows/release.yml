name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 0.2.0)"
        required: true

jobs:
  release:
    name: Build & Publish to PyPI
    runs-on: ubuntu-latest
    # Only run for tag pushes (v* pattern)
    if: startsWith(github.ref, 'refs/tags/v')

    environment:
      name: pypi
      url: https://pypi.org/p/annotation-mcp

    permissions:
      id-token: write  # for OIDC trusted publishing

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install "3.12"

      - name: Build distributions
        run: uv build

      - name: Verify build artifacts
        run: |
          ls -la dist/
          test -f dist/annotation_mcp-*.whl
          test -f dist/annotation_mcp-*.tar.gz

      - name: Publish to PyPI via OIDC
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

  github-release:
    name: Create GitHub Release
    needs: release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        run: |
          # Generate a simple changelog from commits since the last tag
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            RANGE="$(git rev-list --max-parents=0 HEAD)..HEAD"
          else
            RANGE="${PREV_TAG}..HEAD"
          fi
          echo "commits<<EOF" >> "$GITHUB_OUTPUT"
          git log $RANGE --pretty=format:"- %s (%h)" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body: |
            ## Changes

            ${{ steps.changelog.outputs.commits }}

            See [CHANGELOG.md](CHANGELOG.md) for details.
          draft: true
          generate_release_notes: false
