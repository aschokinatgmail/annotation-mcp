name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel in-progress runs for the same branch on new pushes
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      # ─── System dependencies (tesseract + zbar) ───
      # Linux: tesseract + libzbar0 + eng language pack
      # macOS: tesseract + zbar via Homebrew
      # Windows: tesseract via choco, libzbar0 via vcpkg (see below)
      - name: Install system dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            tesseract-ocr \
            tesseract-ocr-eng \
            tesseract-ocr-rus \
            libzbar0 \
            zbar-tools

      - name: Install system dependencies (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          brew update
          brew install tesseract tesseract-lang zbar
          # Help pyzbar find libzbar.dylib on Apple Silicon runners
          echo "DYLD_FALLBACK_LIBRARY_PATH=/opt/homebrew/lib:/usr/local/lib" >> "$GITHUB_ENV"

      - name: Install system dependencies (Windows)
        if: matrix.os == 'windows-latest'
        # tesseract is available via choco; pyzbar ships its own libzbar0
        # bundled, so on Windows we don't need a separate zbar install.
        # tesseract-ocr is portable — we install it to C:\tesseract and
        # add it to PATH so pytesseract can find it.
        shell: pwsh
        run: |
          choco install --no-progress tesseract --installargs 'ADDSTARTUPSEARCH=0 ADDLOCAL=ALL' -y
          echo "C:\Program Files\Tesseract-OCR" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          # Verify
          tesseract --version

      - name: Set up Python
        run: uv python install ${{ matrix.python-version }}

      - name: Install Python dependencies
        run: uv sync --all-extras --dev

      - name: Verify tooling
        shell: bash
        run: |
          uv run python -c "import annotation_mcp; print('import ok')"
          which tesseract && tesseract --version || echo "tesseract not found"
          uv run python -c "from pyzbar.pyzbar import decode; print('pyzbar ok')" 2>/dev/null || echo "pyzbar/zbar not found (barcode tests will skip)"
        continue-on-error: true

      - name: Run tests
        shell: bash
        # On Windows, skip test_mcp_detection.py which spawns subprocess
        # servers — Windows pipe buffering can deadlock on large output.
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            uv run pytest -v --tb=short --ignore=tests/test_heic_support.py --ignore=tests/test_mcp_detection.py
          else
            uv run pytest -v --tb=short --ignore=tests/test_heic_support.py
          fi

      - name: Run HEIC tests
        if: matrix.os == 'macos-latest'
        shell: bash
        run: uv run pytest -v tests/test_heic_support.py --tb=short
        continue-on-error: true

      - name: Type check
        run: uv run basedpyright src/ || true
        continue-on-error: true

      - name: Lint
        run: uv run ruff check src/ tests/ || true
        continue-on-error: true

      - name: Coverage report
        if: matrix.os == 'ubuntu-latest'
        run: |
          uv run pytest --cov=annotation_mcp --cov-report=xml --cov-report=term

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
